<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>TimerTracker Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<!-- LEFT PANEL -->

<div class="leftPanel">

<div class="mainTimer">

<div id="bigTimer">00:00</div>
<div id="bigLabel">No Timer Running</div>

</div>

</div>


<!-- RIGHT PANEL -->

<div class="rightPanel">

<div class="header">

<h1>Timers</h1>

<div>

<button id="obsBtn">OBS</button>
<button id="configBtn">⚙</button>

</div>

<div id="timers"></div>

</div>

</div>


<!-- CONFIG PANEL -->

<div id="configPanel" class="hidden">

<h2>Configuração</h2>

<div id="configTimers"></div>

<button id="saveConfig">Salvar</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
